<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PKL Court Connect — Offline</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0A0118;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
    .container{max-width:320px}
    .icon{font-size:4rem;margin-bottom:1rem}
    h1{font-size:1.25rem;margin-bottom:.5rem}
    p{font-size:.875rem;color:#94a3b8;margin-bottom:1.5rem;line-height:1.5}
    button{background:#7C3AED;color:#fff;border:none;padding:.75rem 1.5rem;border-radius:.75rem;font-size:.875rem;font-weight:600;cursor:pointer;transition:opacity .2s}
    button:hover{opacity:.85}
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>PKL Court Connect needs an internet connection to find players and courts near you. Please check your connection and try again.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
